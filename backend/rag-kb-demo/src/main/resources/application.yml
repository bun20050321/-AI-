spring:
  application:
    name: rag-kb-demo
  datasource:
    url: '${DB_URL:jdbc:mysql://127.0.0.1:3306/rag_kb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&createDatabaseIfNotExist=true}'
    username: '${DB_USERNAME:root}'
    password: '${DB_PASSWORD:}'
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:3000}
  sql:
    init:
      mode: ${DB_INIT_MODE:never}
      schema-locations: classpath:db/init.sql
      continue-on-error: false
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none

server:
  port: ${SERVER_PORT:8081}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.eos.ragkbdemo.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
